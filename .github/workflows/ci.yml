name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_optional_redis:
        description: Run Redis integration
        type: boolean
        default: false
      run_optional_gpu_import:
        description: Import optional GPU adapter dependencies
        type: boolean
        default: false
      run_large_fixtures:
        description: Run non-default large fixture tests
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install tested dependency set
        run: >-
          python -m pip install --upgrade pip &&
          python -m pip install
          -c constraints/py311.txt
          -e ".[server,worker,data,training,models,test,dev]"
      - name: Import and CLI smoke tests
        run: |
          python -c "import pdfword, clouda_contracts, clouda_data, clouda_training, clouda_models"
          python -m clouda_data.pipeline.cli --help
          python -m clouda_training.cli --help
          python -m clouda_data.pipeline.cli distort-batch --help
          python -m clouda_data.pipeline.cli render --help
          python -m clouda_training.cli export --help
      - name: Compile
        run: >-
          python -m compileall -q
          app.py pdfword clouda_contracts clouda_data clouda_training clouda_models
      - name: Ruff
        run: python -m ruff check .
      - name: Black
        run: python -m black --check .
      - name: Mypy
        run: >-
          python -m mypy
          pdfword clouda_contracts clouda_data clouda_training clouda_models
          --ignore-missing-imports
      - name: Offline test suite and runtime coverage gate
        env:
          CLOUDA_STATE_HOME: ${{ runner.temp }}/clouda-state
          CLOUDA_PROJECT_ROOT: ${{ github.workspace }}
          CLOUDA_LOCAL_OCR_ENABLED: "false"
          CLOUDA_NO_NETWORK_TESTS: "true"
        run: >-
          python -m pytest
          --cov=pdfword
          --cov-report=term-missing
          --cov-fail-under=80
      - name: Synthetic OCR data-pipeline acceptance
        env:
          CLOUDA_STATE_HOME: ${{ runner.temp }}/clouda-acceptance
          CLOUDA_PROJECT_ROOT: ${{ github.workspace }}
          CLOUDA_NO_NETWORK_TESTS: "true"
        run: python -m tools.run_synthetic_acceptance
      - name: Secret, large-file, and forbidden-path scan
        run: python -m tools.validation.repository_scan --root .
      - name: Build wheel and sdist
        run: python -m build
      - name: Demo smoke test
        run: python scripts/demo.py

  redis-integration:
    if: github.event_name != 'workflow_dispatch' || inputs.run_optional_redis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install worker test dependencies
        run: >-
          python -m pip install
          -c constraints/py311.txt
          -e ".[server,worker,test]"
      - name: Distributed worker integration tests
        env:
          REDIS_URL: redis://127.0.0.1:6379/0
        run: python -m pytest tests/test_distributed_worker.py -q

  gpu-adapter-import:
    if: github.event_name == 'workflow_dispatch' && inputs.run_optional_gpu_import
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[models]"
      - run: python -c "from pdfword.local_ocr_adapters import TransformersVisionLanguageProvider"

  large-fixtures:
    if: github.event_name == 'workflow_dispatch' && inputs.run_large_fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[data,test]"
      - run: python -m pytest tests/completion -q
