name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements-dev.txt
      - name: Validate fixtures
        run: python tests/fixtures/generate_fixtures.py
      - name: Test with coverage
        run: python -m pytest --cov=pdfword --cov-report=term-missing --cov-fail-under=80
      - name: Lint
        run: python -m ruff check .
      - name: Format check
        run: python -m black --check .
      - name: Type check
        run: python -m mypy .
      - name: Build validation
        run: python -m compileall -q app.py pdfword scripts tests
      - name: Demo smoke test
        run: python scripts/demo.py
