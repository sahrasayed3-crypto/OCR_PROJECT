[pytest]
testpaths = tests
filterwarnings =
    # Starlette 1.3.x emits this from FastAPI's TestClient re-export while
    # httpx/httpx2 support is in transition. It is test-only and non-blocking.
    ignore:Using `httpx` with `starlette.testclient` is deprecated:starlette.exceptions.StarletteDeprecationWarning
norecursedirs =
    .git
    .venv*
    __pycache__
    tools/python
    tools/poppler
    poppler-26.02.0
    samples/generated
    conversions
    data
    logs
    backups
    output
    outputs
    temporary
    tmp
    temp
